<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🧰 Tool Box Dashboard</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body class="light-mode">
  <div class="app-container">

    <header class="header">
      <div class="header-left">
        <span class="logo">🧰</span>
        <h1>Tool Box Dashboard</h1>
      </div>
      <div class="header-right">
        <button id="exportBtn" class="action-btn" title="Download Backup">
          <i class="fas fa-download"></i>
        </button>
        <button id="importBtn" class="action-btn" title="Upload Backup">
          <i class="fas fa-upload"></i>
        </button>
        <input type="file" id="importFile" accept=".json" style="display: none;" />
        
        <button id="darkModeToggle" class="theme-toggle">
          <i class="fas fa-moon"></i> Dark Mode
        </button>
      </div>
    </header>

    <main class="main-content">

      <section class="add-tool-panel">
        <h2><i class="fas fa-plus-circle"></i> Add New Tool</h2>
        <div class="form-grid">
          <input type="text" id="toolName" placeholder="Tool Name (e.g. Notion)" />
          <input type="url" id="toolURL" placeholder="Tool URL (e.g. https://notion.so)" />
          <select id="toolCategory">
            <option value="Work Tools">Work Tools</option>
            <option value="AI Tools">AI Tools</option>
            <option value="News Tools">News Tools</option>
            <option value="Other" selected>Other</option>
          </select>
          <button id="addToolBtn"><i class="fas fa-plus"></i> Add Tool</button>
        </div>
      </section>

      <section class="controls-panel">
        <div class="search-box">
          <i class="fas fa-search"></i>
          <input type="text" id="searchInput" placeholder="Search tools by name..." />
        </div>
        <div class="filter-box">
          <select id="filterCategory">
            <option value="All">All Categories</option>
            <option value="Work Tools">Work Tools</option>
            <option value="AI Tools">AI Tools</option>
            <option value="News Tools">News Tools</option>
            <option value="Other">Other</option>
          </select>
        </div>
      </section>

      <div class="tools-header">
        <span id="toolCount">0 Tools</span>
        <span class="drag-hint" id="dragHint"><i class="fas fa-grip-lines"></i> Drag rows to reorder</span>
      </div>

      <section class="tools-list" id="toolsList"></section>

      <div class="empty-state" id="emptyState" style="display:none;">
        <i class="fas fa-toolbox"></i>
        <p>No tools found. Add your first tool above!</p>
      </div>

    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
