<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tool Box Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="logo">
            <h1>Tool Box</h1>
            <p>Minimal Black & White Dashboard</p>
        </div>
        <div class="controls">
            <input type="text" id="searchInput" placeholder="Search tools or URLs..." autocomplete="off">
            <select id="categoryFilter">
                <option value="all">All Categories</option>
                </select>
        </div>
    </header>

    <main>
        <div id="toolsGrid" class="grid">
            </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
